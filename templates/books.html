{% extends "base.html" %}
{% block content %}

<h4 class="mb-3">Books</h4>

<form method="post" class="row g-2 mb-4">
    <div class="col">
        <input name="title" class="form-control" placeholder="Title" required>
    </div>
    <div class="col">
        <input name="author" class="form-control" placeholder="Author" required>
    </div>
    <div class="col-2">
        <input name="quantity" type="number" class="form-control" placeholder="Qty" required>
    </div>
    <div class="col-2">
        <button class="btn btn-primary w-100">Add</button>
    </div>
</form>

<table class="table table-bordered">
    <thead>
        <tr>
            <th>ID</th><th>Title</th><th>Author</th><th>Qty</th><th></th>
        </tr>
    </thead>
    <tbody>
        {% for b in books %}
        <tr>
            <td>{{b.book_id}}</td>
            <td>{{b.title}}</td>
            <td>{{b.author}}</td>
            <td>{{b.quantity}}</td>
            <td>
                <a href="/delete_book/{{b.book_id}}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
